name: CI/CD

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE: ghcr.io/shawnnnguyen/assetflow-be
  FRONTEND_IMAGE: ghcr.io/shawnnnguyen/assetflow-fe

jobs:
  build-and-push-front:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.set_tag.outputs.image_tag }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ── Frontend ─────────────────────────────────────────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push frontend image
        id: build_fe
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          build-args: |
            VITE_BACKEND_URL=${{ secrets.VITE_BACKEND_URL }}
          tags: |
            ${{ env.FRONTEND_IMAGE }}:latest
            ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

      - name: Export frontend image tag
        id: set_tag
        if: steps.build_fe.outcome == 'success'
        run: echo "image_tag=${{ github.sha }}" >> "$GITHUB_OUTPUT"

  build-and-push-back:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.set_tag.outputs.image_tag }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ── Backend ──────────────────────────────────────────
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: mvn clean package -DskipTests
        working-directory: ./backend

      - name: Build and push backend image
        id: build_be
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:latest
            ${{ env.BACKEND_IMAGE }}:${{ github.sha }}

      - name: Export backend image tag
        id: set_tag
        if: steps.build_be.outcome == 'success'
        run: echo "image_tag=${{ github.sha }}" >> "$GITHUB_OUTPUT"

  deploy:
    runs-on: ubuntu-latest
    needs: [ "build-and-push-front", "build-and-push-back" ]
    if: >-
      github.ref == 'refs/heads/master'
      && github.event_name == 'push'
      && needs.build-and-push-front.outputs.image_tag != ''
      && needs.build-and-push-back.outputs.image_tag != ''
      && needs.build-and-push-front.outputs.image_tag == needs.build-and-push-back.outputs.image_tag
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Copy files to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "docker-compose.prod.yml,monitor"
          target: "~/assetflow"

      - name: Deploy on VPS
        uses: appleboy/ssh-action@v1.0.3
        env:
          IMAGE_TAG: ${{ needs.build-and-push-front.outputs.image_tag }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: IMAGE_TAG
          script: |
            cd ~/assetflow

            # Write .env from secret
            cat > .env << 'ENVEOF'
            ${{ secrets.VPS_ENV }}
            ENVEOF

            # Pin the image tag for this deploy (append/override in .env)
            grep -v '^IMAGE_TAG=' .env > .env.tmp && mv .env.tmp .env
            echo "IMAGE_TAG=${IMAGE_TAG}" >> .env

            # Create Prometheus secret files from .env (keeps files in sync with env vars)
            # sed strips optional surrounding single/double quotes from values
            mkdir -p monitor/secrets
            PROM_USER=$(grep '^PROMETHEUS_SCRAPE_USERNAME=' .env | cut -d'=' -f2- | sed "s/^['\"]//;s/['\"]$//")
            PROM_PASS=$(grep '^PROMETHEUS_SCRAPE_PASSWORD=' .env | cut -d'=' -f2- | sed "s/^['\"]//;s/['\"]$//")
            printf '%s' "$PROM_USER" > monitor/secrets/scrape_username
            printf '%s' "$PROM_PASS" > monitor/secrets/scrape_password
            chmod 600 monitor/secrets/scrape_username monitor/secrets/scrape_password

            # Pull pinned images and restart (monitoring profile included)
            docker compose -f docker-compose.prod.yml --profile monitoring pull
            docker compose -f docker-compose.prod.yml --profile monitoring up -d --remove-orphans

            docker image prune -f
