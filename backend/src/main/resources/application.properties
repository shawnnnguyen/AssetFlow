server.port=${BE_PORT:8080}
spring.application.name=AssetFlow-Backend
spring.profiles.active=${SPRING_PROFILES_ACTIVE}

spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=${DB_DRIVER}

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.jdbc.batch_size=50
spring.jpa.properties.hibernate.order_inserts=true

logging.level.root=INFO

app.frontend.origin=${FRONTEND_ORIGIN:http://localhost:3000}

app.finnhub.websocket.base-url=wss://ws.finnhub.io
app.finnhub.http-method.base-url=https://finnhub.io/api/v1
app.finnhub.api-key=${FINNHUB_API_KEY}

springdoc.swagger-ui.path=/swagger

application.security.jwt.secret-key=${JWT_KEY}
application.security.jwt.expiration-time=${JWT_EXPIRATION}

management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoints.web.base-path=/sys-manage
management.endpoint.health.show-details=when-authorized

management.metrics.distribution.percentiles-histogram.http.server.requests=true

prometheus.scrape.username=${PROMETHEUS_SCRAPE_USERNAME:prometheus}
prometheus.scrape.password=${PROMETHEUS_SCRAPE_PASSWORD}