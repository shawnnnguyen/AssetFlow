global:
  scrape_interval: 10s

scrape_configs:
  - job_name: "assetflow_be"
    metrics_path: "/sys-manage/prometheus"
    basic_auth:
      username_file: /etc/prometheus/secrets/scrape_username
      password_file: /etc/prometheus/secrets/scrape_password
    static_configs:
      - targets: ["backend:8080"]
        labels:
          app: "assetflow"
          env: "prod"
  - job_name: "postgres_exporter"
    static_configs:
      - targets: ["postgres-exporter:9187"]
